<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f8f7f4" />
    <title>子弹计划</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css?v=17" />
  </head>
  <body>
    <main class="journal-shell">
      <header class="journal-header">
        <div>
          <p class="eyebrow">个人子弹计划 <span class="version-badge">v26</span></p>
          <h1 id="pageTitle">本周</h1>
        </div>
        <div class="header-actions">
          <button class="auth-button" id="loginBtn" type="button">登录</button>
          <span class="user-badge" id="userBadge" hidden>
            <span class="user-icon">&#9786;</span>
            <span id="userName"></span>
            <button class="sync-refresh" id="syncRefreshBtn" type="button" title="立即同步">&#8635;</button>
            <button class="user-logout" id="logoutBtn" type="button" title="退出登录">&#10005;</button>
          </span>
          <span class="sync-status" id="syncStatus"></span>
          <button class="icon-button" id="settingsButton" type="button" aria-label="设置" title="设置">&#9881;</button>
          <button class="icon-button" id="installButton" type="button" aria-label="安装到桌面" title="安装到桌面">+</button>
        </div>
      </header>

      <!-- ====== 收件箱 Tab ====== -->
      <section class="tab-panel" id="inboxPanel" aria-label="通知收件箱" hidden>
        <div class="capture-strip">
          <div class="capture-head">
            <div>
              <h2>通知收件箱</h2>
              <p id="accessHint" class="access-hint"></p>
            </div>
            <div class="actions compact-actions">
              <button class="primary-button" id="parseButton" type="button">解析</button>
              <button class="ghost-button" id="pasteButton" type="button">粘贴</button>
            </div>
          </div>
          <textarea id="noticeInput" placeholder="粘贴班群通知，解析后会拆成几条待确认的子弹任务。" spellcheck="false"></textarea>
        </div>

        <section class="inbox-panel" id="reviewPanel" aria-live="polite" hidden>
          <div class="section-heading">
            <h2>待确认子弹</h2>
            <span id="confidenceBadge" class="badge">待判断</span>
          </div>
          <div class="draft-list" id="draftList"></div>
          <details class="source-details">
            <summary>查看原通知</summary>
            <p id="sourceText"></p>
          </details>
          <div class="actions">
            <button class="primary-button" id="createButton" type="button">确认加入</button>
            <button class="ghost-button" id="ignoreButton" type="button">忽略</button>
          </div>
        </section>

        <section class="inbox-history" id="inboxHistory">
          <h3>最近添加</h3>
          <div class="history-list" id="historyList"></div>
        </section>
      </section>

      <!-- ====== 周 Tab ====== -->
      <section class="tab-panel" id="weekPanel" aria-label="本周视图">
        <div class="page-heading week-head-bar">
          <div>
            <p class="page-kicker">Weekly Log</p>
            <h2>本周</h2>
          </div>
          <div class="week-nav">
            <button class="nav-arrow" id="weekPrev" type="button" title="上一周">&larr;</button>
            <span id="weekRange" class="date-range"></span>
            <button class="nav-arrow" id="weekNext" type="button" title="下一周">&rarr;</button>
          </div>
        </div>

        <div class="week-grid" id="weekGrid"></div>

        <section class="legend" id="legendSection">
          <h3>符号</h3>
          <div id="legendList" class="legend-list"></div>
        </section>

        <!-- 今日浮窗 -->
        <div class="sheet-backdrop" id="todayBackdrop" hidden></div>
        <section class="today-sheet" id="todaySheet" aria-label="今日日志" hidden>
          <div class="sheet-handle"></div>
          <div class="sheet-head">
            <div>
              <p class="page-kicker">Daily Log</p>
              <h2>今天</h2>
            </div>
            <p id="todayDate" class="date-range"></p>
            <button class="icon-button sheet-close" id="todayCloseButton" type="button" aria-label="关闭">&times;</button>
          </div>

          <form class="quick-add" id="quickAddForm">
            <select id="quickSymbol" aria-label="子弹类型">
              <option value="•">• 任务</option>
              <option value="–">– 备注</option>
              <option value="*">* 重要</option>
            </select>
            <input id="quickText" type="text" placeholder="快速记录..." autocomplete="off" />
            <button class="primary-button" type="submit">加入</button>
          </form>

          <div class="daily-log" id="todayList"></div>
        </section>
      </section>

      <!-- ====== 月 Tab ====== -->
      <section class="tab-panel" id="monthPanel" aria-label="月视图" hidden>
        <div class="page-heading month-head-bar">
          <div>
            <p class="page-kicker">Monthly Log</p>
            <h2 id="monthTitle">6月 2026</h2>
          </div>
          <div class="month-nav">
            <button class="nav-arrow" id="monthPrev" type="button" title="上一月">&larr;</button>
            <button class="nav-arrow" id="monthNext" type="button" title="下一月">&rarr;</button>
          </div>
        </div>

        <button class="month-todo-fab" id="monthTodoFab" type="button">待办 ▲</button>
        <div class="month-split" id="monthSplit">
          <div class="month-layout" id="monthLayout"></div>
          <aside class="month-todo-sidebar" id="monthTodoSidebar">
            <h3>月度待办</h3>
            <div class="month-todo-cat">
              <p class="cat-label">生活</p>
              <div class="month-todo-list" id="mtodoLife"></div>
              <div class="mtodo-input-row"><input class="month-todo-input" placeholder="添加生活待办..." data-cat="生活" /><button class="mtodo-add-btn" type="button" data-cat="生活">+</button></div>
            </div>
            <div class="month-todo-cat">
              <p class="cat-label">学业</p>
              <div class="month-todo-list" id="mtodoStudy"></div>
              <div class="mtodo-input-row"><input class="month-todo-input" placeholder="添加学业待办..." data-cat="学业" /><button class="mtodo-add-btn" type="button" data-cat="学业">+</button></div>
            </div>
            <div class="month-todo-cat">
              <p class="cat-label">工作</p>
              <div class="month-todo-list" id="mtodoWork"></div>
              <div class="mtodo-input-row"><input class="month-todo-input" placeholder="添加工作待办..." data-cat="工作" /><button class="mtodo-add-btn" type="button" data-cat="工作">+</button></div>
            </div>
          </aside>
        </div>
      </section>

      <!-- ====== 年 Tab ====== -->
      <section class="tab-panel" id="yearPanel" aria-label="年视图" hidden>
        <div class="page-heading">
          <div>
            <p class="page-kicker">Future Log</p>
            <h2 id="yearTitle">2026</h2>
          </div>
          <div class="year-nav">
            <button class="nav-arrow" id="yearPrev" type="button" title="上一年">&larr;</button>
            <button class="nav-arrow" id="yearNext" type="button" title="下一年">&rarr;</button>
          </div>
        </div>

        <div class="half-year-toggle">
          <button class="half-btn active" id="halfFirstBtn" type="button">上半年</button>
          <button class="half-btn" id="halfSecondBtn" type="button">下半年</button>
        </div>

        <div class="year-grid" id="yearGrid"></div>

        <!-- 年视图选色器 -->
        <div class="color-picker" id="colorPicker" hidden>
          <div class="color-options">
            <button class="color-dot" style="background:#e06c6c" data-color="#e06c6c"></button>
            <button class="color-dot" style="background:#e0a56c" data-color="#e0a56c"></button>
            <button class="color-dot" style="background:#d4c04a" data-color="#d4c04a"></button>
            <button class="color-dot" style="background:#6cbe6c" data-color="#6cbe6c"></button>
            <button class="color-dot" style="background:#6ca8e0" data-color="#6ca8e0"></button>
            <button class="color-dot" style="background:#b06ce0" data-color="#b06ce0"></button>
          </div>
          <input class="color-event-input" id="colorEventInput" placeholder="事件描述..." />
          <div class="color-picker-actions">
            <button class="primary-button" id="colorSaveBtn" type="button">保存</button>
            <button class="ghost-button" id="colorCancelBtn" type="button">取消</button>
            <button class="ghost-button" id="colorDeleteBtn" type="button" hidden>删除</button>
          </div>
        </div>
      </section>
    </main>

    <!-- ====== 底部 Tab Bar ====== -->
    <nav class="tab-bar tab-bar-4">
      <button class="tab-button" data-tab="inbox" aria-label="收件箱">
        <span class="tab-icon">&#9998;</span>
        <span class="tab-label">收件箱</span>
      </button>
      <button class="tab-button active" data-tab="week" aria-label="周">
        <span class="tab-icon">&#9702;</span>
        <span class="tab-label">周</span>
      </button>
      <button class="tab-button" data-tab="month" aria-label="月">
        <span class="tab-icon">&#9728;</span>
        <span class="tab-label">月</span>
      </button>
      <button class="tab-button" data-tab="year" aria-label="年">
        <span class="tab-icon">&#9733;</span>
        <span class="tab-label">年</span>
      </button>
    </nav>

    <!-- ====== 设置面板 ====== -->
    <div class="settings-overlay" id="settingsOverlay" hidden>
      <div class="settings-panel" role="dialog" aria-label="设置">
        <div class="settings-head">
          <h2>设置</h2>
          <button class="icon-button" id="settingsCloseButton" type="button" aria-label="关闭">&times;</button>
        </div>
        <label class="settings-field">
          <span>解析器</span>
          <select id="parserSelect">
            <option value="rules">规则解析</option>
            <option value="deepseek">DeepSeek AI</option>
          </select>
        </label>
        <label class="settings-field" id="apiKeyField">
          <span>DeepSeek API Key</span>
          <input id="apiKeyInput" type="password" placeholder="sk-..." autocomplete="off" />
          <span class="field-hint" id="apiKeyHint"></span>
        </label>
        <p class="settings-note">Key 仅保存在此设备的浏览器中。</p>
      </div>
    </div>

    <!-- ====== 符号菜单 Popover ====== -->
    <div class="symbol-popover" id="symbolPopover" hidden>
      <button class="symbol-option" data-sym="×">× 完成</button>
      <button class="symbol-option" data-sym=">">> 迁移</button>
      <button class="symbol-option" data-sym="<">< 排期</button>
      <button class="symbol-option" data-sym="–">– 备注</button>
      <button class="symbol-option" data-sym="*">* 重要</button>
      <button class="symbol-option" data-sym="•">• 任务</button>
    </div>

    <!-- ====== 模板 ====== -->
    <template id="bulletTemplate">
      <article class="bullet-row">
        <button class="bullet-symbol" type="button" title="切换状态"></button>
        <div class="bullet-main">
          <input class="bullet-text" type="text" />
          <p class="bullet-meta"></p>
        </div>
        <button class="migrate-button" type="button" title="迁移到下一天">›</button>
        <button class="delete-button" type="button" title="删除">×</button>
      </article>
    </template>

    <template id="draftTemplate">
      <article class="draft-row">
        <select class="draft-symbol" aria-label="子弹类型">
          <option value="•">•</option>
          <option value="–">–</option>
          <option value="*">*</option>
        </select>
        <input class="draft-text" type="text" />
        <input class="draft-date" type="date" />
        <button class="draft-remove" type="button" title="移除此条">×</button>
      </article>
    </template>

    <template id="monthTodoTemplate">
      <article class="bullet-row">
        <button class="bullet-symbol" type="button"></button>
        <div class="bullet-main">
          <input class="bullet-text" type="text" />
        </div>
        <button class="delete-button" type="button" title="删除">×</button>
      </article>
    </template>

    <script src="./parser.js?v=2"></script>
    <script src="./sync.js?v=4"></script>
    <script src="./app.js?v=18"></script>

    <!-- 同步面板 -->
    <div class="login-overlay" id="loginOverlay" hidden>
      <div class="login-panel">
        <h2>登录 / 注册</h2>
        <p class="login-hint">注册账号后多设备自动同步数据</p>
        <label class="login-field">
          <span>用户名</span>
          <input id="usernameInput" type="text" placeholder="输入用户名" maxlength="20" autocomplete="username" />
        </label>
        <label class="login-field">
          <span>密码</span>
          <input id="passwordInput" type="password" placeholder="输入密码" autocomplete="current-password" />
        </label>
        <div class="sync-actions" style="display:flex;gap:8px">
          <button class="primary-button" id="doLoginBtn" type="button" style="flex:1">登录</button>
          <button class="ghost-button" id="doRegisterBtn" type="button" style="flex:1">注册</button>
        </div>
        <p class="login-note">不同账号数据完全隔离</p>
      </div>
    </div>
  </body>
</html>
